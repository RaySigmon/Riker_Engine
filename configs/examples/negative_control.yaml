# Negative Control — Random genes on ASD brain cortex datasets
# Tests whether the pipeline correctly returns empty/near-empty results
# when given genes with no expected association to ASD.
#
# 500 randomly selected protein-coding genes (seed 42), excluding all
# SFARI ASD genes, run against the same ASD brain cortex datasets.
#
# NOTE: Uses only the 5 auto-downloadable microarray datasets (not the
# 2 RNA-seq datasets that require reconstruction). This is sufficient
# for the negative control — the question is whether random genes produce
# signal, not whether all 7 ASD datasets are present.
#
# To download data: python scripts/download_data.py asd

condition: negative_control_random
seed_genes: data/seeds/negative_control_random_500.csv
symbol_column: symbol
hgnc_path: data/hgnc/hgnc_complete_set.txt
output_dir: results/negative_control

datasets:
  # Discovery (brain, microarray)
  - id: GSE28521
    series_matrix: data/geo/asd/GSE28521_series_matrix.txt.gz
    platform: data/platforms/GPL6883.annot
    role: discovery
    tissue: brain
    phenotype_field: Sample_characteristics_ch1
    case_values: ["disease status: autism"]
    control_values: ["disease status: controls"]

  - id: GSE28475
    series_matrix: data/geo/asd/GSE28475-GPL6883_series_matrix.txt.gz
    platform: data/platforms/GPL6883.annot
    role: discovery
    tissue: brain
    phenotype_field: Sample_characteristics_ch1
    case_values: ["diagnosis: autism"]
    control_values: ["diagnosis: control"]

  # Replication (blood/LCL, microarray)
  - id: GSE18123
    series_matrix: data/geo/asd/GSE18123-GPL6244_series_matrix.txt.gz
    platform: data/platforms/GPL6244.annot
    role: replication
    tissue: blood
    phenotype_field: Sample_characteristics_ch1
    case_values: ["diagnosis: autism"]
    control_values: ["diagnosis: control"]

  - id: GSE26415
    series_matrix: data/geo/asd/GSE26415_series_matrix.txt.gz
    platform: data/platforms/GPL6480.annot
    role: replication
    tissue: blood
    phenotype_field: Sample_characteristics_ch1
    case_values: ["disease: autism spectrum disorder"]
    control_values: ["disease: nonaustistic"]

  - id: GSE42133
    series_matrix: data/geo/asd/GSE42133_series_matrix.txt.gz
    platform: data/platforms/GPL10558.annot
    role: replication
    tissue: blood
    phenotype_field: Sample_characteristics_ch1
    case_values: ["dx (diagnosis): asd"]
    control_values: ["dx (diagnosis): control"]

phase1:
  p_threshold: 0.05
  min_datasets: 2
