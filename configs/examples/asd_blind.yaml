# ASD Blind Run — All protein-coding genes (hypothesis-free)
# Same datasets as asd_bulk.yaml but with all 19,296 protein-coding genes as seeds
# Tests whether curated core genes are recovered without prior hypothesis

condition: ASD_blind
seed_genes: data/seeds/all_protein_coding_genes.csv
symbol_column: symbol
hgnc_path: data/hgnc/hgnc_complete_set.txt
output_dir: output/asd_blind

datasets:
  # === Discovery datasets (brain tissue) ===

  - id: GSE28521
    series_matrix: data/geo/asd/GSE28521_series_matrix.txt.gz
    platform: data/platforms/GPL6883.annot
    role: discovery
    tissue: brain
    phenotype_field: Sample_characteristics_ch1
    case_values: ["disease status: autism"]
    control_values: ["disease status: control"]

  - id: GSE28475
    series_matrix: data/geo/asd/GSE28475-GPL6883_series_matrix.txt.gz
    platform: data/platforms/GPL6883.annot
    role: discovery
    tissue: brain
    phenotype_field: Sample_characteristics_ch1
    case_values: ["diagnosis: autism"]
    control_values: ["diagnosis: control"]

  - id: GSE64018
    series_matrix: data/geo/asd/GSE64018_reconstructed_series_matrix.txt.gz
    platform: data/mappings/ensembl_to_symbol.txt
    role: discovery
    tissue: brain
    phenotype_field: Sample_characteristics_ch1
    case_values: ["diagnosis: asd"]
    control_values: ["diagnosis: ctl"]

  # === Replication datasets ===

  - id: GSE102741
    series_matrix: data/geo/asd/GSE102741_reconstructed_series_matrix.txt.gz
    platform: data/mappings/ensembl_to_symbol.txt
    role: replication
    tissue: brain
    phenotype_field: Sample_characteristics_ch1
    case_values: ["disease status: autism spectrum disorder"]
    control_values: ["disease status: healthy control"]

  - id: GSE18123
    series_matrix: data/geo/asd/GSE18123-GPL6244_series_matrix.txt.gz
    platform: data/platforms/GPL6244.annot
    role: replication
    tissue: blood
    phenotype_field: Sample_characteristics_ch1
    case_values: ["diagnosis: autism", "diagnosis: pdd-nos", "diagnosis: asperger"]
    control_values: ["diagnosis: control"]

  - id: GSE26415
    series_matrix: data/geo/asd/GSE26415_series_matrix.txt.gz
    platform: data/platforms/GPL6480.annot
    role: replication
    tissue: blood
    phenotype_field: Sample_characteristics_ch1
    case_values: ["disease: autism spectrum disorder"]
    control_values: ["disease: nonaustistic control"]
    # NOTE: This dataset has 4 groups of 21. The engine matches 21 ASD cases
    # and 42 controls (21 ASD-matched + 21 mother controls). Both control
    # groups are labeled "disease: nonaustistic control" in the GEO metadata.
    # Both are healthy non-autistic adults. The mother controls share genetics
    # with ASD children but do not have ASD. Using 42 controls is conservative
    # (increases statistical power for replication testing in Phase 5).

  - id: GSE42133
    series_matrix: data/geo/asd/GSE42133_series_matrix.txt.gz
    platform: data/platforms/GPL10558.annot
    role: replication
    tissue: blood
    phenotype_field: Sample_characteristics_ch1
    case_values: ["dx (diagnosis): asd"]
    control_values: ["dx (diagnosis): control"]

phase1:
  p_threshold: 0.05
  min_datasets: 2

phase3:
  n_neighbors: [10, 15, 30]
  seeds: [42, 123, 456, 789, 1024]
  min_cluster_size: 5
  min_samples: 3

phase4:
  n_permutations: 10000
  seed: 42
