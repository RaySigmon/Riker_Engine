# Psoriasis Blind Run — All protein-coding genes (hypothesis-free)
condition: Psoriasis_blind
seed_genes: data/seeds/all_protein_coding_genes.csv
symbol_column: symbol
hgnc_path: data/hgnc/hgnc_complete_set.txt
output_dir: output/psoriasis_blind

datasets:
  - id: GSE13355
    series_matrix: data/geo/psoriasis/GSE13355_series_matrix.txt.gz
    platform: data/platforms/GPL570.annot
    role: discovery
    tissue: skin
    phenotype_field: Sample_characteristics_ch1
    case_values: ["involved skin"]
    control_values: ["normal skin"]

  - id: GSE30999
    series_matrix: data/geo/psoriasis/GSE30999_series_matrix.txt.gz
    platform: data/platforms/GPL570.annot
    role: discovery
    tissue: skin
    phenotype_field: Sample_characteristics_ch1
    case_values: ["lesion (LS)"]
    control_values: ["non-lesion (NL)"]

  - id: GSE41662
    series_matrix: data/geo/psoriasis/GSE41662_series_matrix.txt.gz
    platform: data/platforms/GPL570.annot
    role: discovery
    tissue: skin
    phenotype_field: Sample_characteristics_ch1
    case_values: ["Lesional skin"]
    control_values: ["Non-lesional skin"]

  - id: GSE50790
    series_matrix: data/geo/psoriasis/GSE50790_series_matrix.txt.gz
    platform: data/platforms/GPL570.annot
    role: replication
    tissue: skin
    phenotype_field: Sample_characteristics_ch1
    case_values: ["phenotype: lesional"]
    control_values: ["phenotype: uninvolved"]

  # NOTE: GSE54456 removed — RNA-seq dataset with no expression table,
  # not compatible with microarray parser. Psoriasis hits 50/50 exact without it.

phase1:
  p_threshold: 0.05
  min_datasets: 2
