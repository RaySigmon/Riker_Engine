# ASD Microarray-Only Config
# Uses 5 auto-downloadable microarray datasets (no RNA-seq reconstruction needed)
# To download data: python scripts/download_data.py asd
#
# NOTE: The full 7-dataset ASD validation (which produced 35 core genes)
# includes 2 RNA-seq datasets (GSE64018, GSE102741) that require manual
# reconstruction. See docs/DATA_RECONSTRUCTION.md for instructions.
# This config uses only the 5 microarray datasets for immediate reproducibility.

condition: ASD
seed_genes: data/seeds/asd_sfari_genes.csv
symbol_column: symbol
hgnc_path: data/hgnc/hgnc_complete_set.txt
output_dir: output/asd_microarray_only

datasets:
  # Discovery (brain, microarray)
  - id: GSE28521
    series_matrix: data/geo/asd/GSE28521_series_matrix.txt.gz
    platform: data/platforms/GPL6883.annot
    role: discovery
    tissue: brain
    phenotype_field: Sample_characteristics_ch1
    case_values: ["disease status: autism"]
    control_values: ["disease status: controls"]

  - id: GSE28475
    series_matrix: data/geo/asd/GSE28475-GPL6883_series_matrix.txt.gz
    platform: data/platforms/GPL6883.annot
    role: discovery
    tissue: brain
    phenotype_field: Sample_characteristics_ch1
    case_values: ["diagnosis: autism"]
    control_values: ["diagnosis: control"]

  # Replication (blood/LCL, microarray)
  - id: GSE18123
    series_matrix: data/geo/asd/GSE18123-GPL6244_series_matrix.txt.gz
    platform: data/platforms/GPL6244.annot
    role: replication
    tissue: blood
    phenotype_field: Sample_characteristics_ch1
    case_values: ["diagnosis: autism", "diagnosis: pdd-nos", "diagnosis: asperger"]
    control_values: ["diagnosis: control"]

  - id: GSE26415
    series_matrix: data/geo/asd/GSE26415_series_matrix.txt.gz
    platform: data/platforms/GPL6480.annot
    role: replication
    tissue: blood
    phenotype_field: Sample_characteristics_ch1
    case_values: ["disease: autism spectrum disorder"]
    control_values: ["disease: nonaustistic control"]
    # NOTE: Matches 21 ASD vs 42 controls (21 ASD-matched + 21 mother controls).

  - id: GSE42133
    series_matrix: data/geo/asd/GSE42133_series_matrix.txt.gz
    platform: data/platforms/GPL10558.annot
    role: replication
    tissue: blood
    phenotype_field: Sample_characteristics_ch1
    case_values: ["dx (diagnosis): asd"]
    control_values: ["dx (diagnosis): control"]

phase1:
  p_threshold: 0.05
  min_datasets: 2

phase3:
  n_neighbors: [10, 15, 30]
  seeds: [42, 123, 456, 789, 1024]
  min_cluster_size: 5
  min_samples: 3

phase4:
  n_permutations: 10000
  seed: 42
