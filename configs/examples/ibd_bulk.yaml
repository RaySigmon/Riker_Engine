# IBD Curated Validation Config
# 6 intestinal mucosa datasets, Open Targets gene seeds
# To download data: python scripts/download_data.py ibd

condition: IBD
seed_genes: data/seeds/ibd_open_targets_genes.csv
symbol_column: symbol
hgnc_path: data/hgnc/hgnc_complete_set.txt
output_dir: output/ibd_curated

datasets:
  # === Discovery datasets (intestinal mucosa) ===

  # Colonic + ileal mucosa, CD + UC + controls
  - id: GSE75214
    series_matrix: data/geo/ibd/GSE75214_series_matrix.txt.gz
    platform: data/platforms/GPL6244.annot
    role: discovery
    tissue: colon
    phenotype_field: Sample_characteristics_ch1
    case_values: ["disease: cd", "disease: crohn", "disease: ulcerative colitis"]
    control_values: ["disease: control"]

  # Colonic mucosa, CD + UC, before/after infliximab
  - id: GSE16879
    series_matrix: data/geo/ibd/GSE16879_series_matrix.txt.gz
    platform: data/platforms/GPL570.annot
    role: discovery
    tissue: colon
    phenotype_field: Sample_characteristics_ch1
    case_values: ["disease: cd", "disease: uc"]
    control_values: ["disease: control"]

  # Colonic mucosa, CD + UC + controls
  - id: GSE59071
    series_matrix: data/geo/ibd/GSE59071_series_matrix.txt.gz
    platform: data/platforms/GPL6244.annot
    role: discovery
    tissue: colon
    phenotype_field: Sample_characteristics_ch1
    case_values: ["disease: crohn", "disease: ulcerative colitis"]
    control_values: ["disease: control"]

  # === Replication datasets ===

  # Colonic mucosa, UC + normal
  - id: GSE87466
    series_matrix: data/geo/ibd/GSE87466_series_matrix.txt.gz
    platform: data/platforms/GPL13158.annot
    role: replication
    tissue: colon
    phenotype_field: Sample_characteristics_ch1
    case_values: ["disease: ulcerative colitis"]
    control_values: ["disease: normal"]

  # Colonic mucosa, UC + non-inflammatory controls
  - id: GSE38713
    series_matrix: data/geo/ibd/GSE38713_series_matrix.txt.gz
    platform: data/platforms/GPL570.annot
    role: replication
    tissue: colon
    phenotype_field: Sample_source_name_ch1
    case_values: ["uc patient"]
    control_values: ["non-inflammatory control"]

  # Colonic tissue, CD + UC + healthy controls
  - id: GSE36807
    series_matrix: data/geo/ibd/GSE36807_series_matrix.txt.gz
    platform: data/platforms/GPL570.annot
    role: replication
    tissue: colon
    phenotype_field: Sample_characteristics_ch1
    case_values: ["diagnosis: crohn", "diagnosis: ulcerative colitis"]
    control_values: ["diagnosis: healthy control"]

phase1:
  p_threshold: 0.05
  min_datasets: 2
