# AD Blind Run — All expressed genes (hypothesis-free)
# REQUIRES 16+ GB RAM (14,442 study genes at Phase 3)
# Run on RunPod, not on Ghost (Pi 5, 8GB)

condition: alzheimers_disease_blind
seed_genes: all_expressed
hgnc_path: data/hgnc/hgnc_complete_set.txt
output_dir: results/ad/blind

datasets:
  # Discovery
  - id: GSE33000
    series_matrix: data/geo/ad/GSE33000_AD_only_series_matrix.txt.gz
    platform: data/platforms/GPL4372.annot
    role: discovery
    tissue: brain
    phenotype_field: Sample_characteristics_ch2
    case_values: ["disease status: alzheimer"]
    control_values: ["disease status: non-demented"]

  - id: GSE44770
    series_matrix: data/geo/ad/GSE44770_series_matrix.txt.gz
    platform: data/platforms/GPL4372.annot
    role: discovery
    tissue: brain
    phenotype_field: Sample_characteristics_ch2
    case_values: ["disease: a"]
    control_values: ["disease: n"]

  - id: GSE118553
    series_matrix: data/geo/ad/GSE118553_TC_series_matrix.txt.gz
    platform: data/platforms/GPL10558.annot
    role: discovery
    tissue: brain
    phenotype_field: Sample_characteristics_ch1
    case_values: ["disease state: ad"]
    control_values: ["disease state: control"]

  # Replication
  - id: GSE5281
    series_matrix: data/geo/ad/GSE5281_SFG_series_matrix.txt.gz
    platform: data/platforms/GPL570.annot
    role: replication
    tissue: brain
    phenotype_field: Sample_characteristics_ch1
    case_values: ["disease state: alzheimer"]
    control_values: ["disease state: normal"]

  - id: GSE15222
    series_matrix: data/geo/ad/GSE15222_series_matrix.txt.gz
    platform: data/platforms/GPL2700.annot
    role: replication
    tissue: brain
    phenotype_field: Sample_source_name_ch1
    case_values: ["alzheimer"]
    control_values: ["normal"]

phase1:
  p_threshold: 0.05
  min_datasets: 2

phase3:
  n_neighbors: [10, 15, 30]
  seeds: [42, 123, 456, 789, 1024]
  min_cluster_size: 5
  min_samples: 3

phase4:
  n_permutations: 10000
  seed: 42
