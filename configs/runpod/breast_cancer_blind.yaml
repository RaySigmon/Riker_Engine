# Breast Cancer Blind Run — All expressed genes (hypothesis-free)
# REQUIRES 16+ GB RAM (unknown study gene count, likely >8K)
# Run on RunPod, not on Ghost (Pi 5, 8GB)

condition: breast_cancer_blind
seed_genes: all_expressed
hgnc_path: data/hgnc/hgnc_complete_set.txt
output_dir: results/breast_cancer/blind

datasets:
  # Discovery
  - id: GSE10810
    series_matrix: data/geo/breast_cancer/GSE10810_series_matrix.txt.gz
    platform: data/platforms/GPL570.annot
    role: discovery
    tissue: breast
    phenotype_field: Sample_characteristics_ch1
    case_values: ["tumor (t) vs healthy (s): t"]
    control_values: ["tumor (t) vs healthy (s): s"]

  - id: GSE42568
    series_matrix: data/geo/breast_cancer/GSE42568_series_matrix.txt.gz
    platform: data/platforms/GPL570.annot
    role: discovery
    tissue: breast
    phenotype_field: Sample_characteristics_ch1
    case_values: ["tissue: breast cancer"]
    control_values: ["tissue: normal breast"]

  - id: GSE15852
    series_matrix: data/geo/breast_cancer/GSE15852_series_matrix.txt.gz
    platform: data/platforms/GPL96.annot
    role: discovery
    tissue: breast
    phenotype_field: Sample_source_name_ch1
    case_values: ["breast tumor tissue"]
    control_values: ["normal breast tissue"]

  # Replication
  - id: GSE45827
    series_matrix: data/geo/breast_cancer/GSE45827_series_matrix.txt.gz
    platform: data/platforms/GPL570.annot
    role: replication
    tissue: breast
    phenotype_field: Sample_characteristics_ch1
    case_values: ["diagnosis: breast cancer"]
    control_values: ["diagnosis: none"]

  - id: GSE65194
    series_matrix: data/geo/breast_cancer/GSE65194_series_matrix.txt.gz
    platform: data/platforms/GPL570.annot
    role: replication
    tissue: breast
    phenotype_field: Sample_characteristics_ch1
    case_values: ["sample_group: tnbc", "sample_group: her2", "sample_group: luminal"]
    control_values: ["sample_group: healthy"]

phase1:
  p_threshold: 0.05
  min_datasets: 2

phase4:
  n_permutations: 10000
  seed: 42
