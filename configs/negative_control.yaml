# Negative Control — Random genes on ASD brain cortex datasets
# Tests whether the pipeline correctly returns empty/near-empty results
# when given genes with no expected association to ASD.
#
# 500 randomly selected protein-coding genes (seed 42), excluding all
# SFARI ASD genes, run against the same 7 ASD brain cortex datasets
# used in the curated validation.

condition: negative_control_random
seed_genes: data/seeds/negative_control_random_500.csv
symbol_column: symbol
hgnc_path: /home/kai001/.riker/hgnc_complete_set.txt
output_dir: results/negative_control

datasets:
  # === Discovery datasets (brain tissue) ===
  - id: GSE28521
    series_matrix: /home/kai001/riker-archive/old-iterations/asd_validation/data/bulk_geo/GSE28521_series_matrix.txt.gz
    platform: /home/kai001/riker-archive/old-iterations/asd_validation/data/bulk_geo/GPL6883.annot
    role: discovery
    tissue: brain
    phenotype_field: Sample_characteristics_ch1
    case_values: ["disease status: autism"]
    control_values: ["disease status: controls"]

  - id: GSE28475
    series_matrix: /home/kai001/riker-archive/old-iterations/asd_validation/data/bulk_geo/GSE28475-GPL6883_series_matrix.txt.gz
    platform: /home/kai001/riker-archive/old-iterations/asd_validation/data/bulk_geo/GPL6883.annot
    role: discovery
    tissue: brain
    phenotype_field: Sample_characteristics_ch1
    case_values: ["diagnosis: autism"]
    control_values: ["diagnosis: control"]

  - id: GSE64018
    series_matrix: /home/kai001/riker-archive/old-iterations/asd_validation/data/bulk_geo/GSE64018_reconstructed_series_matrix.txt.gz
    platform: /home/kai001/riker-archive/old-iterations/asd_validation/data/bulk_geo/ensembl_to_symbol.txt
    role: discovery
    tissue: brain
    phenotype_field: Sample_characteristics_ch1
    case_values: ["diagnosis: asd"]
    control_values: ["diagnosis: ctl"]

  # === Replication datasets ===
  - id: GSE102741
    series_matrix: /home/kai001/riker-archive/old-iterations/asd_validation/data/bulk_geo/GSE102741_reconstructed_series_matrix.txt.gz
