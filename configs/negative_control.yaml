    role: replication
    tissue: brain
    phenotype_field: Sample_characteristics_ch1
    case_values: ["disease status: autism spectrum disorder"]
    control_values: ["disease status: healthy control"]

  - id: GSE18123
    series_matrix: /home/kai001/riker-archive/old-iterations/asd_validation/data/bulk_geo/GSE18123-GPL6244_series_matrix.txt.gz
    platform: /home/kai001/riker-archive/old-iterations/asd_validation/data/bulk_geo/GPL6244.annot
    role: replication
    tissue: blood
    phenotype_field: Sample_characteristics_ch1
    case_values: ["diagnosis: autism"]
